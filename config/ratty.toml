[window]
width = 960
height = 620
scale_factor = 1.0

[terminal]
default_cols = 104
default_rows = 32
scrollback = 10000

[shell]
program = "/bin/bash"
args = []

[env]
TERM = "xterm-256color"

[font]
family = "Ubuntu Mono Ligaturized"
style = "Regular"
size = 20

[theme]
foreground = "#dcd7ba"
background = "#1f1f28"
cursor = "#7e9cd8"

[cursor.model]
path = "CairoSpinyMouse.obj"
scale_factor = 6.0
x_offset = 0.5
plane_offset = 18.0
visible = true

[cursor.animation]
spin_speed = 1.4
bob_speed = 2.2
bob_amplitude = 0.08

[bindings]
keys = [
  { key = "Enter", with = "Control | alt", action = "ToggleMode" },
  { key = "C", with = "Control | alt", action = "Copy" },
  { key = "V", with = "Control | alt", action = "Paste" },
  { key = "Equal", with = "Control", action = "IncreaseFontSize" },
  { key = "Minus", with = "Control", action = "DecreaseFontSize" },
]
